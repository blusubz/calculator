<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>Calculator</title>
        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@v0.184.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@v0.184.0/examples/jsm/"
                }
            }
        </script>
    </head>
    <body>
        <h1 class="display">0</h1>
        <div class="btnContainer">
            
            <button id="Escape" value="Escape">AC</button>
            <button id="Backspace">&larr;</button>
            <button class="operator" id="/" value="/">&divide;</button>

            <button class="digit" id="7" value="7">7</button>
            <button class="digit" id="8" value="8">8</button>
            <button class="digit" id="9" value="9">9</button>
            <button class="operator" id="*" value="*">&times;</button>
            
            <button class="digit" id="4" value="4">4</button>
            <button class="digit"id="5" value="5">5</button>
            <button class="digit" id="6" value="6">6</button>
            <button class="operator" id="-" value="-">&minus;</button>
            
            <button class="digit" id="1" value="1">1</button>
            <button class="digit" id="2" value="2">2</button>            
            <button class="digit" id="3" value="3">3</button>
            <button class="operator" id="+" value="+">&plus;</button>

            <button class="digit" id="0" value="0">0</button>
            <button class="digit" id="." value=".">.</button>
            <button class="executor" id="=" value="=">&equals;</button>
        </div>

        <!-- 3D object will go in bottom display  // Latest 3JS v0.184.0 -->
        <div class="bottom-display">
            <!-- The transparent layer for 3D canvas-->
            <canvas id="bg-canvas"></canvas>
        </div>



        <script src="script.js" defer></script>
        <script type="module" src="./main.js"></script>
    </body>
</html>
